<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beach Sunset Bar</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; }
  canvas { display: block; }
  #info {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    color: #fff; font-family: 'Georgia', serif; font-size: 14px;
    background: rgba(0,0,0,0.4); padding: 8px 18px; border-radius: 20px;
    pointer-events: none; letter-spacing: 1px;
  }
</style>
</head>
<body>
<div id="info">Drag to look around &middot; Scroll to zoom</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';

// ── Renderer ──
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
document.body.appendChild(renderer.domElement);

// ── Scene & Fog ──
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0xffaa66, 0.008);

// ── Camera ──
const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(12, 5, 18);
camera.lookAt(0, 2, 0);

// ── Controls ──
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.maxPolarAngle = Math.PI / 2.05;
controls.minDistance = 5;
controls.maxDistance = 50;
controls.target.set(0, 2, 0);

// ── Clock ──
const clock = new THREE.Clock();

// ═══════════════════════════════════════
// SKY DOME
// ═══════════════════════════════════════
const skyGeo = new THREE.SphereGeometry(200, 32, 32);
const skyMat = new THREE.ShaderMaterial({
  side: THREE.BackSide,
  uniforms: {
    uSunPos: { value: new THREE.Vector3(-60, 8, -100) }
  },
  vertexShader: `
    varying vec3 vWorldPos;
    void main() {
      vWorldPos = (modelMatrix * vec4(position, 1.0)).xyz;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform vec3 uSunPos;
    varying vec3 vWorldPos;

    // Simple hash-based noise for clouds
    float hash(vec2 p) {
      return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
    }
    float noise(vec2 p) {
      vec2 i = floor(p);
      vec2 f = fract(p);
      f = f * f * (3.0 - 2.0 * f);
      float a = hash(i);
      float b = hash(i + vec2(1.0, 0.0));
      float c = hash(i + vec2(0.0, 1.0));
      float d = hash(i + vec2(1.0, 1.0));
      return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
    }
    float fbm(vec2 p) {
      float v = 0.0;
      float a = 0.5;
      for (int i = 0; i < 5; i++) {
        v += a * noise(p);
        p *= 2.0;
        a *= 0.5;
      }
      return v;
    }

    void main() {
      vec3 dir = normalize(vWorldPos);
      float y = dir.y;

      // Sky gradient: deep purple/blue top → orange/pink mid → warm red at horizon
      vec3 topColor = vec3(0.08, 0.02, 0.28);       // deep purple
      vec3 upperColor = vec3(0.2, 0.05, 0.35);       // purple
      vec3 midColor = vec3(0.85, 0.35, 0.25);        // warm orange-pink
      vec3 lowColor = vec3(0.95, 0.45, 0.15);        // orange at horizon
      vec3 bottomColor = vec3(0.8, 0.25, 0.12);

      vec3 sky;
      if (y > 0.0) {
        float t = pow(y, 0.35);
        // Three-stop gradient: horizon → mid → upper → top
        if (t < 0.3) {
          sky = mix(lowColor, midColor, t / 0.3);
        } else if (t < 0.6) {
          sky = mix(midColor, upperColor, (t - 0.3) / 0.3);
        } else {
          sky = mix(upperColor, topColor, (t - 0.6) / 0.4);
        }
      } else {
        sky = bottomColor;
      }

      // Sun glow — smaller, more distant
      vec3 sunDir = normalize(uSunPos);
      float sunDot = max(dot(dir, sunDir), 0.0);
      float sunDisc = smoothstep(0.9992, 0.9997, sunDot);   // much smaller disc
      float sunGlow = pow(sunDot, 16.0) * 0.4;              // tighter glow
      float sunHalo = pow(sunDot, 4.0) * 0.2;               // subtler halo

      vec3 sunColor = vec3(1.0, 0.85, 0.5);
      sky += sunColor * sunDisc * 2.5;
      sky += sunColor * sunGlow;
      sky += vec3(1.0, 0.45, 0.2) * sunHalo;

      // Clouds
      if (y > 0.0) {
        vec2 cloudUV = dir.xz / (y + 0.1) * 1.5;
        float cloud = fbm(cloudUV * 1.2 + vec2(0.3, 0.7));
        cloud = smoothstep(0.35, 0.65, cloud);
        // Clouds lit by sunset — orange near horizon, purple higher up
        float ht = pow(y, 0.5);
        vec3 cloudLit = mix(vec3(1.0, 0.55, 0.25), vec3(0.5, 0.2, 0.4), ht);
        vec3 cloudDark = mix(vec3(0.4, 0.15, 0.2), vec3(0.15, 0.05, 0.2), ht);
        // Sun-facing clouds brighter
        float sunFace = pow(max(sunDot, 0.0), 2.0);
        vec3 cloudColor = mix(cloudDark, cloudLit, 0.5 + sunFace * 0.5);
        sky = mix(sky, cloudColor, cloud * 0.7);
      }

      gl_FragColor = vec4(sky, 1.0);
    }
  `
});
scene.add(new THREE.Mesh(skyGeo, skyMat));

// ═══════════════════════════════════════
// OCEAN
// ═══════════════════════════════════════
const oceanGeo = new THREE.PlaneGeometry(400, 400, 256, 256);
const oceanMat = new THREE.ShaderMaterial({
  uniforms: {
    uTime: { value: 0 },
    uSunPos: { value: new THREE.Vector3(-60, 8, -100) },
    uCamPos: { value: camera.position }
  },
  vertexShader: `
    uniform float uTime;
    varying vec3 vWorldPos;
    varying vec3 vNormal;
    varying float vFoam;

    // Gerstner-style wave function
    vec3 gerstnerWave(vec2 pos, vec2 dir, float steepness, float wavelength, float time) {
      float k = 6.28318 / wavelength;
      float c = sqrt(9.8 / k);
      float f = k * (dot(dir, pos) - c * time);
      float a = steepness / k;
      return vec3(dir.x * a * cos(f), a * sin(f), dir.y * a * cos(f));
    }

    void main() {
      vec3 pos = position;

      // Multiple Gerstner waves for realistic ocean
      vec3 w1 = gerstnerWave(pos.xy, normalize(vec2(1.0, 0.3)), 0.25, 12.0, uTime * 0.8);
      vec3 w2 = gerstnerWave(pos.xy, normalize(vec2(0.7, 1.0)), 0.15, 8.0, uTime * 0.6);
      vec3 w3 = gerstnerWave(pos.xy, normalize(vec2(-0.4, 0.8)), 0.1, 5.0, uTime * 1.0);
      vec3 w4 = gerstnerWave(pos.xy, normalize(vec2(0.2, -0.6)), 0.08, 3.0, uTime * 1.3);
      vec3 w5 = gerstnerWave(pos.xy, normalize(vec2(-0.8, 0.3)), 0.05, 1.5, uTime * 1.8);

      vec3 wave = w1 + w2 + w3 + w4 + w5;
      pos.x += wave.x;
      pos.z += wave.z;
      pos.y += wave.y;  // Note: y is "up" before rotation

      // Foam on wave peaks
      vFoam = smoothstep(0.3, 0.7, wave.y / 0.6);

      // Compute normal via finite differences
      float eps = 0.5;
      vec3 posR = position + vec3(eps, 0.0, 0.0);
      vec3 posF = position + vec3(0.0, eps, 0.0);
      vec3 wR = gerstnerWave(posR.xy, normalize(vec2(1.0,0.3)), 0.25, 12.0, uTime*0.8)
              + gerstnerWave(posR.xy, normalize(vec2(0.7,1.0)), 0.15, 8.0, uTime*0.6)
              + gerstnerWave(posR.xy, normalize(vec2(-0.4,0.8)), 0.1, 5.0, uTime*1.0)
              + gerstnerWave(posR.xy, normalize(vec2(0.2,-0.6)), 0.08, 3.0, uTime*1.3)
              + gerstnerWave(posR.xy, normalize(vec2(-0.8,0.3)), 0.05, 1.5, uTime*1.8);
      vec3 wF = gerstnerWave(posF.xy, normalize(vec2(1.0,0.3)), 0.25, 12.0, uTime*0.8)
              + gerstnerWave(posF.xy, normalize(vec2(0.7,1.0)), 0.15, 8.0, uTime*0.6)
              + gerstnerWave(posF.xy, normalize(vec2(-0.4,0.8)), 0.1, 5.0, uTime*1.0)
              + gerstnerWave(posF.xy, normalize(vec2(0.2,-0.6)), 0.08, 3.0, uTime*1.3)
              + gerstnerWave(posF.xy, normalize(vec2(-0.8,0.3)), 0.05, 1.5, uTime*1.8);
      vec3 tangent = normalize(vec3(eps + wR.x - wave.x, wR.y - wave.y, wR.z - wave.z));
      vec3 bitangent = normalize(vec3(wF.x - wave.x, wF.y - wave.y, eps + wF.z - wave.z));
      vNormal = normalize(cross(bitangent, tangent));

      vWorldPos = (modelMatrix * vec4(pos, 1.0)).xyz;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
    }
  `,
  fragmentShader: `
    uniform vec3 uSunPos;
    uniform vec3 uCamPos;
    varying vec3 vWorldPos;
    varying vec3 vNormal;
    varying float vFoam;

    void main() {
      vec3 N = normalize(vNormal);
      vec3 sunDir = normalize(uSunPos - vWorldPos);
      vec3 viewDir = normalize(uCamPos - vWorldPos);
      vec3 reflDir = reflect(-viewDir, N);

      // Fresnel — Schlick approximation
      float cosTheta = max(dot(N, viewDir), 0.0);
      float fresnel = 0.04 + 0.96 * pow(1.0 - cosTheta, 5.0);

      // Deep vs shallow water color
      vec3 deepColor = vec3(0.01, 0.04, 0.12);
      vec3 shallowColor = vec3(0.04, 0.16, 0.28);
      float depthFactor = pow(cosTheta, 0.6);
      vec3 waterBody = mix(shallowColor, deepColor, depthFactor);

      // Sky/sunset reflection color (approximate)
      float reflY = max(reflDir.y, 0.0);
      vec3 skyReflColor = mix(
        vec3(0.85, 0.4, 0.2),  // horizon orange
        vec3(0.15, 0.05, 0.3), // upper purple
        pow(reflY, 0.5)
      );

      // Sun specular — two lobes for realism
      vec3 halfDir = normalize(sunDir + viewDir);
      float specTight = pow(max(dot(N, halfDir), 0.0), 512.0);
      float specWide = pow(max(dot(N, halfDir), 0.0), 64.0);
      vec3 sunSpec = vec3(1.0, 0.8, 0.4) * (specTight * 3.0 + specWide * 0.4);

      // Combine: water body + reflected sky + sun specular
      vec3 color = mix(waterBody, skyReflColor, fresnel) + sunSpec;

      // Foam — white caps on wave peaks
      vec3 foamColor = vec3(0.85, 0.88, 0.9);
      color = mix(color, foamColor, vFoam * 0.3);

      // Subsurface scattering effect — light through wave crests
      float sss = pow(max(dot(viewDir, -sunDir), 0.0), 4.0) * pow(1.0 - cosTheta, 2.0);
      color += vec3(0.1, 0.3, 0.25) * sss * 0.3;

      // Distance/atmospheric fog
      float dist = length(vWorldPos - uCamPos);
      vec3 fogColor = vec3(0.8, 0.45, 0.3);
      color = mix(color, fogColor, 1.0 - exp(-dist * 0.005));

      gl_FragColor = vec4(color, 0.94);
    }
  `,
  transparent: true
});
const ocean = new THREE.Mesh(oceanGeo, oceanMat);
ocean.rotation.x = -Math.PI / 2;
ocean.position.set(0, -0.1, -100);
scene.add(ocean);

// ═══════════════════════════════════════
// BEACH (sand) — procedural texture matching reference photo
// ═══════════════════════════════════════

// Generate sand texture on canvas — bumpy granular sand with pebbles
function createSandTexture(size) {
  const canvas = document.createElement('canvas');
  canvas.width = canvas.height = size;
  const ctx = canvas.getContext('2d');

  // Base sand color
  ctx.fillStyle = '#c8a46e';
  ctx.fillRect(0, 0, size, size);

  // Layer 1: Large sand ripples/undulations
  for (let i = 0; i < 3000; i++) {
    const x = Math.random() * size;
    const y = Math.random() * size;
    const r = 2 + Math.random() * 6;
    const brightness = Math.random() * 40 - 20;
    const base = [190 + brightness, 155 + brightness, 100 + brightness];
    ctx.fillStyle = `rgb(${base[0]},${base[1]},${base[2]})`;
    ctx.beginPath();
    ctx.ellipse(x, y, r, r * 0.6, Math.random() * Math.PI, 0, Math.PI * 2);
    ctx.fill();
  }

  // Layer 2: Fine grain noise
  const imageData = ctx.getImageData(0, 0, size, size);
  const data = imageData.data;
  for (let i = 0; i < data.length; i += 4) {
    const noise = (Math.random() - 0.5) * 30;
    data[i] += noise;
    data[i + 1] += noise;
    data[i + 2] += noise * 0.7;
  }
  ctx.putImageData(imageData, 0, 0);

  // Layer 3: Shadow ripple lines (like wind patterns)
  ctx.globalAlpha = 0.15;
  for (let i = 0; i < 80; i++) {
    const y = Math.random() * size;
    const startX = Math.random() * size * 0.3;
    ctx.strokeStyle = Math.random() > 0.5 ? '#8a6a3a' : '#d4b882';
    ctx.lineWidth = 0.5 + Math.random() * 1.5;
    ctx.beginPath();
    ctx.moveTo(startX, y);
    let cx = startX;
    for (let j = 0; j < 8; j++) {
      cx += 20 + Math.random() * 60;
      const cy = y + (Math.random() - 0.5) * 8;
      ctx.lineTo(cx, cy);
    }
    ctx.stroke();
  }
  ctx.globalAlpha = 1.0;

  // Layer 4: Small pebbles and shell fragments
  for (let i = 0; i < 200; i++) {
    const x = Math.random() * size;
    const y = Math.random() * size;
    const r = 0.8 + Math.random() * 2;
    const shade = Math.floor(Math.random() * 80 + 140);
    ctx.fillStyle = `rgb(${shade},${shade - 10},${shade - 25})`;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
  }

  return canvas;
}

function createSandNormalMap(size) {
  const canvas = document.createElement('canvas');
  canvas.width = canvas.height = size;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#8080ff'; // neutral normal
  ctx.fillRect(0, 0, size, size);

  // Bump ripples
  for (let i = 0; i < 5000; i++) {
    const x = Math.random() * size;
    const y = Math.random() * size;
    const r = 1 + Math.random() * 4;
    const nx = Math.floor(128 + (Math.random() - 0.5) * 60);
    const ny = Math.floor(128 + (Math.random() - 0.5) * 60);
    ctx.fillStyle = `rgb(${nx},${ny},220)`;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
  }
  return canvas;
}

const sandColorCanvas = createSandTexture(1024);
const sandNormalCanvas = createSandNormalMap(1024);

const sandColorTex = new THREE.CanvasTexture(sandColorCanvas);
sandColorTex.wrapS = sandColorTex.wrapT = THREE.RepeatWrapping;
sandColorTex.repeat.set(8, 4);
sandColorTex.colorSpace = THREE.SRGBColorSpace;

const sandNormalTex = new THREE.CanvasTexture(sandNormalCanvas);
sandNormalTex.wrapS = sandNormalTex.wrapT = THREE.RepeatWrapping;
sandNormalTex.repeat.set(8, 4);

const sandGeo = new THREE.PlaneGeometry(80, 40, 120, 60);
const posAttr = sandGeo.attributes.position;
for (let i = 0; i < posAttr.count; i++) {
  const x = posAttr.getX(i);
  const y = posAttr.getY(i);
  // Undulating sand dunes + fine grain
  let z = Math.sin(x * 0.3) * Math.cos(y * 0.2) * 0.12;
  z += Math.sin(x * 0.8 + y * 0.5) * 0.05;
  z += (Math.random() - 0.5) * 0.04;
  // Slope down toward ocean
  z += Math.max(0, (y + 20) * 0.02);
  posAttr.setZ(i, z);
}
sandGeo.computeVertexNormals();

const sandMat = new THREE.MeshStandardMaterial({
  map: sandColorTex,
  normalMap: sandNormalTex,
  normalScale: new THREE.Vector2(0.8, 0.8),
  roughness: 0.92,
  metalness: 0.0,
});
const sand = new THREE.Mesh(sandGeo, sandMat);
sand.rotation.x = -Math.PI / 2;
sand.position.set(0, -0.05, 10);
sand.receiveShadow = true;
scene.add(sand);

// ═══════════════════════════════════════
// HELPER FUNCTIONS
// ═══════════════════════════════════════
function createWood(color = 0x8B5E3C) {
  return new THREE.MeshStandardMaterial({ color, roughness: 0.85, metalness: 0.05 });
}
function createThatch() {
  return new THREE.MeshStandardMaterial({ color: 0xC4A35A, roughness: 1.0, metalness: 0.0, side: THREE.DoubleSide });
}

// ═══════════════════════════════════════
// BEACH BAR
// ═══════════════════════════════════════
const barGroup = new THREE.Group();
barGroup.position.set(0, 0, 6);
scene.add(barGroup);

const woodMat = createWood();
const darkWoodMat = createWood(0x5C3A1E);
const thatchMat = createThatch();

// Bar counter
const counterGeo = new THREE.BoxGeometry(8, 0.15, 2);
const counter = new THREE.Mesh(counterGeo, darkWoodMat);
counter.position.set(0, 1.1, 0);
counter.castShadow = true;
counter.receiveShadow = true;
barGroup.add(counter);

// Counter front panel
const panelGeo = new THREE.BoxGeometry(8, 1.0, 0.1);
const panel = new THREE.Mesh(panelGeo, woodMat);
panel.position.set(0, 0.6, 1.0);
panel.castShadow = true;
barGroup.add(panel);

// Support posts (4 corners)
const postGeo = new THREE.CylinderGeometry(0.1, 0.12, 3.5, 8);
const postPositions = [
  [-3.8, 1.75, -1.2], [3.8, 1.75, -1.2],
  [-3.8, 1.75, 1.2], [3.8, 1.75, 1.2]
];
postPositions.forEach(p => {
  const post = new THREE.Mesh(postGeo, woodMat);
  post.position.set(...p);
  post.castShadow = true;
  barGroup.add(post);
});

// Roof beams
const beamGeo = new THREE.BoxGeometry(9, 0.12, 0.12);
[-1.2, 1.2].forEach(z => {
  const beam = new THREE.Mesh(beamGeo, woodMat);
  beam.position.set(0, 3.5, z);
  barGroup.add(beam);
});
const crossBeamGeo = new THREE.BoxGeometry(0.12, 0.12, 2.6);
[-3.8, 0, 3.8].forEach(x => {
  const beam = new THREE.Mesh(crossBeamGeo, woodMat);
  beam.position.set(x, 3.5, 0);
  barGroup.add(beam);
});

// Thatched roof
const roofGeo = new THREE.ConeGeometry(6.5, 1.8, 4);
const roof = new THREE.Mesh(roofGeo, thatchMat);
roof.position.set(0, 4.5, 0);
roof.rotation.y = Math.PI / 4;
roof.castShadow = true;
barGroup.add(roof);

// Back shelf
const shelfGeo = new THREE.BoxGeometry(6, 0.08, 0.6);
[1.5, 2.2, 2.9].forEach(y => {
  const shelf = new THREE.Mesh(shelfGeo, woodMat);
  shelf.position.set(0, y, -1.0);
  shelf.receiveShadow = true;
  barGroup.add(shelf);
});

// Bottles on shelves
const bottleColors = [0x2d5016, 0x4a1a08, 0x1a3a5c, 0x8B0000, 0xDAA520, 0x2E8B57, 0x4B0082];
function createBottle(x, y, z, colorIdx) {
  const grp = new THREE.Group();
  const bodyGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.35, 8);
  const bodyMat = new THREE.MeshPhysicalMaterial({
    color: bottleColors[colorIdx % bottleColors.length],
    roughness: 0.1, metalness: 0.1, transmission: 0.4, thickness: 0.5
  });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  grp.add(body);
  const neckGeo = new THREE.CylinderGeometry(0.03, 0.06, 0.15, 8);
  const neck = new THREE.Mesh(neckGeo, bodyMat);
  neck.position.y = 0.25;
  grp.add(neck);
  grp.position.set(x, y + 0.22, z);
  return grp;
}

for (let i = 0; i < 8; i++) {
  barGroup.add(createBottle(-2.5 + i * 0.7, 1.5, -1.0, i));
}
for (let i = 0; i < 6; i++) {
  barGroup.add(createBottle(-1.8 + i * 0.7, 2.2, -1.0, i + 2));
}
for (let i = 0; i < 5; i++) {
  barGroup.add(createBottle(-1.5 + i * 0.7, 2.9, -1.0, i + 4));
}

// Bar stools
function createStool(x, z) {
  const grp = new THREE.Group();
  // Seat
  const seatGeo = new THREE.CylinderGeometry(0.3, 0.28, 0.08, 12);
  const seat = new THREE.Mesh(seatGeo, darkWoodMat);
  seat.position.y = 0.8;
  seat.castShadow = true;
  grp.add(seat);
  // Legs
  const legGeo = new THREE.CylinderGeometry(0.03, 0.04, 0.8, 6);
  for (let a = 0; a < 4; a++) {
    const angle = (a / 4) * Math.PI * 2;
    const leg = new THREE.Mesh(legGeo, woodMat);
    leg.position.set(Math.cos(angle) * 0.18, 0.4, Math.sin(angle) * 0.18);
    leg.rotation.x = Math.sin(angle) * 0.1;
    leg.rotation.z = -Math.cos(angle) * 0.1;
    grp.add(leg);
  }
  // Footrest ring
  const ringGeo = new THREE.TorusGeometry(0.2, 0.015, 6, 16);
  const ring = new THREE.Mesh(ringGeo, woodMat);
  ring.position.y = 0.25;
  ring.rotation.x = Math.PI / 2;
  grp.add(ring);

  grp.position.set(x, 0, z);
  return grp;
}

[-3, -1.5, 0, 1.5, 3].forEach(x => {
  barGroup.add(createStool(x, 2.0));
});

// ═══════════════════════════════════════
// PALM TREES
// ═══════════════════════════════════════
function createPalmTree(x, z, height = 6, lean = 0.3) {
  const grp = new THREE.Group();

  // Trunk - curved using segments
  const segments = 10;
  const trunkMat = createWood(0x8B6914);
  for (let i = 0; i < segments; i++) {
    const t = i / segments;
    const segH = height / segments;
    const radius = THREE.MathUtils.lerp(0.2, 0.08, t);
    const segGeo = new THREE.CylinderGeometry(radius * 0.9, radius, segH, 8);
    const seg = new THREE.Mesh(segGeo, trunkMat);
    seg.position.y = t * height + segH / 2;
    seg.position.x = Math.sin(t * lean * Math.PI) * 1.5;
    seg.position.z = Math.cos(t * 0.5) * 0.3;
    seg.castShadow = true;
    grp.add(seg);
  }

  // Fronds
  const frondMat = new THREE.MeshStandardMaterial({
    color: 0x2d5016, roughness: 0.8, metalness: 0.0, side: THREE.DoubleSide
  });
  const topY = height;
  const topX = Math.sin(lean * Math.PI) * 1.5;

  for (let i = 0; i < 7; i++) {
    const angle = (i / 7) * Math.PI * 2 + Math.random() * 0.3;
    const frondLength = 2.5 + Math.random() * 1.5;
    const frondGeo = new THREE.PlaneGeometry(0.6, frondLength, 1, 4);
    const fposAttr = frondGeo.attributes.position;
    for (let j = 0; j < fposAttr.count; j++) {
      const fy = fposAttr.getY(j);
      const normalizedY = (fy + frondLength / 2) / frondLength;
      fposAttr.setZ(j, -normalizedY * normalizedY * 1.5);
      fposAttr.setX(j, fposAttr.getX(j) * (1.0 - normalizedY * 0.5));
    }
    frondGeo.computeVertexNormals();
    const frond = new THREE.Mesh(frondGeo, frondMat);
    frond.position.set(topX, topY, 0);
    frond.rotation.y = angle;
    frond.rotation.x = -0.2;
    frond.rotation.z = 0.3;
    frond.castShadow = true;
    grp.add(frond);
  }

  grp.position.set(x, 0, z);
  return grp;
}

// String lights along bar roof

const bulbGeo = new THREE.SphereGeometry(0.06, 8, 8);
const warmColors = [0xffcc44, 0xffaa22, 0xff8833, 0xffdd55, 0xffbb33];

for (let i = 0; i < 14; i++) {
  const t = i / 13;
  const x = THREE.MathUtils.lerp(-4.2, 4.2, t);
  const sag = Math.sin(t * Math.PI) * 0.3;
  const y = 3.3 - sag;
  const z = 1.2;

  const color = warmColors[i % warmColors.length];
  const bulbMat = new THREE.MeshStandardMaterial({
    color: color, emissive: color, emissiveIntensity: 2.0
  });
  const bulb = new THREE.Mesh(bulbGeo, bulbMat);
  bulb.position.set(x, y, z);
  stringLightGroup.add(bulb);

  // Wire to next bulb
  if (i < 13) {
    const nextT = (i + 1) / 13;
    const nextX = THREE.MathUtils.lerp(-4.2, 4.2, nextT);
    const nextSag = Math.sin(nextT * Math.PI) * 0.3;
    const wireGeo = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(x, y, z),
      new THREE.Vector3((x + nextX) / 2, y - 0.08, z),
      new THREE.Vector3(nextX, 3.3 - nextSag, z)
    ]);
    const wireMat = new THREE.LineBasicMaterial({ color: 0x333333 });
    stringLightGroup.add(new THREE.Line(wireGeo, wireMat));
  }

  // Point light every 3rd bulb
  if (i % 3 === 0) {
    const pl = new THREE.PointLight(color, 1.5, 6, 2);
    pl.position.set(x, y, z);
    stringLightGroup.add(pl);
  }
}

// Back row string lights
for (let i = 0; i < 14; i++) {

  bulb.position.set(x, y, z);

}

// Tiki torches flanking the bar
function createTikiTorch(x, z) {
  const grp = new THREE.Group();
  // Pole
  const poleGeo = new THREE.CylinderGeometry(0.04, 0.06, 2.0, 8);
  const pole = new THREE.Mesh(poleGeo, createWood(0x6B4226));
  pole.position.y = 1.0;
  pole.castShadow = true;
  grp.add(pole);

  // Torch head
  const headGeo = new THREE.CylinderGeometry(0.1, 0.06, 0.25, 8);
  const headMat = new THREE.MeshStandardMaterial({ color: 0x4a3520, roughness: 0.9 });
  const head = new THREE.Mesh(headGeo, headMat);
  head.position.y = 2.15;
  grp.add(head);

  // Flame (emissive sphere)
  const flameGeo = new THREE.SphereGeometry(0.08, 8, 8);
  const flameMat = new THREE.MeshStandardMaterial({
    color: 0xff6600, emissive: 0xff4400, emissiveIntensity: 3.0, transparent: true, opacity: 0.9
  });
  const flame = new THREE.Mesh(flameGeo, flameMat);
  flame.position.y = 2.35;
  flame.userData.isFlame = true;
  grp.add(flame);

  // Flame light
  const fLight = new THREE.PointLight(0xff6622, 3, 10, 2);
  fLight.position.y = 2.4;
  fLight.castShadow = true;
  fLight.shadow.mapSize.set(512, 512);
  fLight.userData.isFlameLight = true;
  grp.add(fLight);

  grp.position.set(x, 0, z);
  return grp;
}

// Beach chairs (loungers)
function createLounger(x, z, rot) {
  const grp = new THREE.Group();
  const baseMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee, roughness: 0.5 });
  const fabricMat = new THREE.MeshStandardMaterial({ color: 0x225588, roughness: 0.8 });

  // Frame
  const frameGeo = new THREE.BoxGeometry(0.8, 0.05, 2);
  const frame = new THREE.Mesh(frameGeo, baseMat);
  frame.position.y = 0.35;
  frame.receiveShadow = true;
  grp.add(frame);

  // Fabric
  const fabGeo = new THREE.BoxGeometry(0.7, 0.04, 1.8);
  const fab = new THREE.Mesh(fabGeo, fabricMat);
  fab.position.y = 0.39;
  grp.add(fab);

  // Back rest
  const backGeo = new THREE.BoxGeometry(0.7, 0.6, 0.04);
  const back = new THREE.Mesh(backGeo, fabricMat);
  back.position.set(0, 0.6, -0.8);
  back.rotation.x = -0.4;
  grp.add(back);

  // Legs
  const legGeo = new THREE.CylinderGeometry(0.02, 0.02, 0.35, 6);
  [[-0.35, -0.85], [0.35, -0.85], [-0.35, 0.85], [0.35, 0.85]].forEach(([lx, lz]) => {
    const leg = new THREE.Mesh(legGeo, baseMat);
    leg.position.set(lx, 0.175, lz);
    grp.add(leg);
  });

  grp.position.set(x, 0, z);
  grp.rotation.y = rot;
  return grp;
}

// POST-PROCESSING
// ═══════════════════════════════════════
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));

const bloomPass = new UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight),
  0.6,   // strength
  0.4,   // radius
  0.85   // threshold
);
composer.addPass(bloomPass);

// Color grading pass - warm sunset tint
const colorGradeShader = {
  uniforms: {
    tDiffuse: { value: null },
    uWarmth: { value: 0.12 }
  },
  vertexShader: `
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform float uWarmth;
    varying vec2 vUv;
    void main() {
      vec4 color = texture2D(tDiffuse, vUv);
      // Warm shift
      color.r += uWarmth * 0.5;
      color.g += uWarmth * 0.15;
      // Slight vignette
      float dist = distance(vUv, vec2(0.5));
      color.rgb *= 1.0 - dist * 0.5;
      gl_FragColor = color;
    }
  `
};
composer.addPass(new ShaderPass(colorGradeShader));

// ═══════════════════════════════════════
// ANIMATION
// ═══════════════════════════════════════
const torches = [torch1, torch2, torch3, torch4];

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // Update ocean
  oceanMat.uniforms.uTime.value = t;
  oceanMat.uniforms.uCamPos.value.copy(camera.position);

  // Flicker torch flames
  torches.forEach((torch, idx) => {
    torch.traverse(child => {
      if (child.userData.isFlame) {
        child.scale.setScalar(0.9 + Math.sin(t * 8 + idx * 2) * 0.15 + Math.sin(t * 13 + idx) * 0.1);
        child.position.y = 2.35 + Math.sin(t * 6 + idx) * 0.02;
      }
      if (child.userData.isFlameLight) {
        child.intensity = 3 + Math.sin(t * 10 + idx * 3) * 0.8 + Math.sin(t * 15 + idx * 1.5) * 0.4;
      }
    });
  });

  controls.update();
  composer.render();
}

animate();

  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
});
